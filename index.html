<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Summarizer</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-shape shape1"></div>
<div class="bg-shape shape2"></div>

<button id="themeToggle" class="theme-toggle" title="Toggle dark mode">🌙</button>

<div class="container">
  <header>
    <h1>📧 Email Summarizer</h1>
    <p>Paste any email and get a clean, instant summary.</p>
  </header>

  <div class="card">
    <div class="input-section">
      <div class="label-row">
        <label for="emailInput">Your Email</label>
        <span id="charCount" class="char-count">0 characters</span>
      </div>
      <textarea id="emailInput" placeholder="Paste your email text here..."></textarea>

      <div class="controls">
        <div class="slider-group">
          <label for="sentCount">Summary length: <span id="sentValue">3</span> sentences</label>
          <input type="range" id="sentCount" min="1" max="10" value="3">
        </div>

        <div class="button-row">
          <button id="summarizeBtn" class="btn primary">
            <span class="btn-text">✨ Summarize</span>
            <span class="spinner hidden"></span>
          </button>
          <button id="clearBtn" class="btn secondary">🗑 Clear</button>
          <button id="sampleBtn" class="btn secondary">📋 Try Sample</button>
        </div>
      </div>
    </div>

    <div id="resultSection" class="result-section hidden">
      <div class="label-row">
        <label>Summary</label>
        <div class="result-actions">
          <span id="reductionStat" class="badge"></span>
          <button id="copyBtn" class="btn small">📄 Copy</button>
        </div>
      </div>
      <div id="summary" class="summary-box"></div>
    </div>
  </div>

  <footer>Runs entirely in your browser — no data ever leaves your device.</footer>
</div>

<div id="toast" class="toast hidden">Copied to clipboard!</div>

<script src="script.js"></script>
</body>
</html>
